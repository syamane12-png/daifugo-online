<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大富豪 オンライン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --felt:#1f4d3d; --felt-dark:#143126; --felt-line:rgba(255,255,255,0.08);
    --cream:#faf6ec; --ink:#211c15; --red:#b23a3a; --gold:#c9a227; --gold-soft:#e8cf7a;
    --muted:#a9b8ae; --muted-dim:#6f8377; --danger:#8c3535;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{margin:0;min-height:100vh;background:radial-gradient(ellipse at 50% -10%,#2a5c48 0%,var(--felt) 45%,var(--felt-dark) 100%);
    font-family:'Zen Kaku Gothic New',sans-serif;color:var(--cream);display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;}
  .display{font-family:'Shippori Mincho',serif;}
  #app{flex:1;display:flex;flex-direction:column;min-height:100vh;}

  /* setup */
  .setup-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .setup-card{width:100%;max-width:460px;background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
    border:1px solid var(--felt-line);border-radius:18px;padding:32px 28px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
  .brand{text-align:center;margin-bottom:6px;}
  .brand .kanji{font-size:2.6rem;font-weight:800;letter-spacing:.08em;text-shadow:0 2px 0 rgba(0,0,0,.25);}
  .brand .en{display:block;margin-top:2px;font-size:.72rem;letter-spacing:.35em;color:var(--gold-soft);text-transform:uppercase;}
  .brand .suits{margin-top:10px;font-size:1.1rem;letter-spacing:.5em;color:var(--muted-dim);}
  .setup-section{margin-top:26px;}
  .setup-label{font-size:.78rem;color:var(--muted);margin-bottom:10px;letter-spacing:.05em;}
  .count-row{display:flex;gap:8px;}
  .count-btn{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--felt-line);background:rgba(255,255,255,.03);
    color:var(--cream);font-size:1rem;cursor:pointer;font-weight:700;font-family:inherit;}
  .count-btn.active{background:var(--gold);color:var(--felt-dark);border-color:var(--gold);}
  .name-list{display:flex;flex-direction:column;gap:10px;margin-top:12px;}
  .name-row{display:flex;align-items:center;gap:10px;}
  .name-badge{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;
    justify-content:center;font-size:.78rem;color:var(--gold-soft);flex-shrink:0;font-weight:700;}
  .name-row input{flex:1;padding:9px 12px;border-radius:9px;border:1px solid var(--felt-line);background:rgba(0,0,0,.18);
    color:var(--cream);font-size:.95rem;font-family:inherit;}
  .start-btn{margin-top:26px;width:100%;padding:14px 0;border:none;border-radius:11px;
    background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:var(--felt-dark);font-weight:900;font-size:1.02rem;
    letter-spacing:.06em;cursor:pointer;font-family:inherit;box-shadow:0 6px 18px rgba(201,162,39,.25);}
  .rules-link{display:block;text-align:center;margin-top:14px;font-size:.78rem;color:var(--muted-dim);text-decoration:underline;
    cursor:pointer;background:none;border:none;font-family:inherit;}

  /* reveal / pass-device */
  .reveal-wrap{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;
    background:repeating-linear-gradient(135deg,var(--felt-dark),var(--felt-dark) 14px,#17392d 14px,#17392d 28px);
    padding:24px;text-align:center;}
  .reveal-box{background:rgba(20,49,38,.85);border:1px solid var(--felt-line);border-radius:18px;padding:40px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);max-width:400px;width:100%;}
  .reveal-box .who{font-size:.85rem;color:var(--muted);letter-spacing:.1em;}
  .reveal-box .name{font-size:2rem;font-weight:800;margin:10px 0 4px;color:var(--gold-soft);}
  .reveal-box .hint{font-size:.82rem;color:var(--muted-dim);margin-bottom:26px;}
  .reveal-btn{padding:13px 34px;border:none;border-radius:11px;background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    color:var(--felt-dark);font-weight:900;font-size:.98rem;cursor:pointer;font-family:inherit;}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;
    padding:8px 14px;border-bottom:1px solid var(--felt-line);background:rgba(0,0,0,.14);}
  .topbar .title{font-size:.9rem;font-weight:700;letter-spacing:.06em;color:var(--gold-soft);}
  .badge-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .badge{font-size:.68rem;padding:3px 9px;border-radius:20px;border:1px solid var(--muted-dim);color:var(--muted);}
  .badge.on{background:var(--danger);border-color:var(--danger);color:#fff;}
  .badge.gold{background:var(--gold);border-color:var(--gold);color:var(--felt-dark);font-weight:700;}
  .top-rules-btn{background:none;border:1px solid var(--felt-line);color:var(--muted);font-size:.68rem;
    padding:4px 10px;border-radius:20px;cursor:pointer;font-family:inherit;}

  /* arena */
  .arena{position:relative;flex:1;min-height:380px;max-height:58vh;padding:10px;}
  .seat{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;
    background:rgba(255,255,255,.03);border:1px solid var(--felt-line);border-radius:14px;padding:9px 14px;min-width:88px;}
  .seat.tl{top:10px;left:10px;} .seat.tr{top:10px;right:10px;} .seat.bl{bottom:10px;left:10px;} .seat.br{bottom:10px;right:10px;}
  .seat.tc{top:10px;left:50%;transform:translateX(-50%);}
  .seat.current{border-color:var(--gold);background:rgba(201,162,39,.15);}
  .seat.done{opacity:.5;}
  .face{width:36px;height:36px;border-radius:50%;background:linear-gradient(160deg,#3a6b56,#20402f);
    display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;border:1px solid var(--felt-line);color:var(--gold-soft);}
  .seat .sname{font-size:.76rem;font-weight:700;}
  .seat .sscore{font-size:.66rem;color:var(--gold-soft);font-weight:700;}
  .seat .srank{font-size:.64rem;color:var(--gold-soft);font-weight:700;}

  .field-zone{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(78%,420px);height:190px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;}
  .field-empty{color:var(--muted-dim);font-size:.82rem;letter-spacing:.08em;text-align:center;}
  .lock-banner{background:var(--gold);color:var(--felt-dark);font-weight:800;font-size:.76rem;padding:6px 14px;
    border-radius:10px;text-align:center;box-shadow:0 3px 10px rgba(0,0,0,.3);animation:lockPulse 1.5s ease-in-out infinite;}
  @keyframes lockPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.035);}}
  .hint-panel{margin:8px 10px 0;padding:10px 14px;border-radius:12px;background:rgba(201,162,39,.1);
    border:1px solid rgba(201,162,39,.35);}
  .hint-panel-title{font-size:.72rem;font-weight:800;color:var(--gold-soft);margin-bottom:5px;letter-spacing:.05em;}
  .hint-panel-line{font-size:.74rem;color:var(--cream);line-height:1.5;}
  .hint-panel-line.strong{color:var(--gold-soft);font-weight:700;margin-top:3px;}
  .field-cards{position:relative;width:100%;height:140px;}
  .log-line{font-size:.74rem;color:var(--muted);text-align:center;max-width:360px;}

  .pile-cluster{position:absolute;display:flex;flex-direction:column;align-items:center;}
  .pile-cluster:not(.active){opacity:.68;}
  .pile-tag{font-size:.58rem;color:var(--gold-soft);background:rgba(0,0,0,.4);padding:1px 6px;border-radius:8px;
    margin-bottom:3px;white-space:nowrap;}
  .pile-cards{display:flex;}
  .pile-cluster.active .pile-cards{filter:drop-shadow(0 0 4px rgba(201,162,39,.7));}
  .pile-card{width:40px;height:56px;border-radius:6px;background:var(--cream);border:1px solid rgba(0,0,0,.15);
    box-shadow:0 3px 7px rgba(0,0,0,.3);display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-weight:700;color:var(--ink);margin-left:-13px;flex-shrink:0;}
  .pile-card:first-child{margin-left:0;}
  .pile-card.red{color:var(--red);} .pile-card.joker{color:var(--gold);}
  .pile-card .r{font-size:.78rem;} .pile-card .s{font-size:.82rem;} .pile-card .rj{font-size:.52rem;text-align:center;}

  .trick-log{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:380px;}
  .trick-chip{font-size:.62rem;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.06);
    border:1px solid var(--felt-line);color:var(--muted);white-space:nowrap;}
  .trick-chip.pass{color:var(--muted-dim);font-style:italic;}

  .mini-fan{position:relative;height:32px;width:78px;}
  .mini-back{position:absolute;width:19px;height:27px;border-radius:4px;top:0;
    background:repeating-linear-gradient(135deg,#173a2c,#173a2c 4px,#1f4d3d 4px,#1f4d3d 8px);
    border:1px solid var(--gold-soft);box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .mini-count-badge{position:absolute;right:-2px;bottom:-6px;background:var(--gold);color:var(--felt-dark);
    font-size:.6rem;font-weight:800;padding:1px 5px;border-radius:8px;border:1px solid var(--felt-dark);}

  .hand-panel{background:rgba(0,0,0,.18);border-top:1px solid var(--felt-line);padding:12px 12px 16px;}
  .hand-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding:0 4px;}
  .hand-head .htitle{font-size:.78rem;color:var(--muted);letter-spacing:.06em;}
  .hand-head .hscore{font-size:.76rem;color:var(--gold-soft);font-weight:700;}
  .hint-line{font-size:.72rem;color:var(--muted-dim);text-align:center;margin-bottom:6px;min-height:1.1em;}
  .hand-row{display:flex;gap:7px;overflow-x:auto;padding:6px 4px 10px;}
  .hand-row-fan{display:flex;padding:10px 4px 16px;overflow-x:auto;}
  .card{flex-shrink:0;width:50px;height:70px;border-radius:8px;background:var(--cream);border:1px solid rgba(0,0,0,.15);
    display:block;box-shadow:0 2px 4px rgba(0,0,0,.25);
    font-weight:700;color:var(--ink);cursor:pointer;user-select:none;transition:transform .12s ease;font-family:inherit;
    position:relative;touch-action:none;overflow:hidden;}
  .card .corner{position:absolute;top:4px;left:4px;display:flex;flex-direction:column;align-items:center;line-height:1.05;}
  .card .corner .r{font-size:.74rem;font-weight:800;} .card .corner .s{font-size:.8rem;margin-top:1px;}
  .card .center-suit{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.6rem;opacity:.25;}
  .card.red{color:var(--red);}
  .card.joker{color:var(--gold);border-color:var(--gold);}
  .card.selected{transform:translateY(-12px);box-shadow:0 8px 16px rgba(0,0,0,.35),0 0 0 2px var(--gold);z-index:40 !important;}
  .card.dragging{opacity:.85;box-shadow:0 10px 20px rgba(0,0,0,.5);}
  .action-row{display:flex;gap:10px;padding:0 4px;}
  .btn{flex:1;padding:12px 0;border-radius:11px;border:none;font-weight:900;font-size:.92rem;cursor:pointer;
    letter-spacing:.03em;font-family:inherit;}
  .btn.play{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:var(--felt-dark);}
  .btn.pass{background:rgba(255,255,255,.08);color:var(--cream);border:1px solid var(--felt-line);}
  .btn.clear{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--felt-line);flex:0 0 auto;padding:12px 18px;}
  .btn:disabled{opacity:.35;cursor:not-allowed;}

  .result-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .result-card{max-width:460px;width:100%;background:rgba(20,49,38,.85);border:1px solid var(--felt-line);
    border-radius:18px;padding:30px 26px;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .result-card h2{text-align:center;font-family:'Shippori Mincho',serif;font-size:1.5rem;margin:0 0 6px;color:var(--gold-soft);}
  .result-sub{text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:20px;}
  .rank-list{display:flex;flex-direction:column;gap:9px;}
  .rank-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--felt-line);}
  .rank-row .num{font-family:'Shippori Mincho',serif;font-size:1.1rem;color:var(--muted);width:20px;}
  .rank-row .rname{flex:1;font-weight:700;font-size:.88rem;}
  .rank-row .rtitle{font-size:.72rem;color:var(--gold-soft);font-weight:700;margin-right:8px;}
  .rank-row .rpt{font-size:.82rem;font-weight:800;} .rank-row .rpt.pos{color:#8fd19e;} .rank-row .rpt.neg{color:#e08a8a;}
  .rank-row .rtotal{font-size:.68rem;color:var(--muted-dim);}
  .result-btns{display:flex;gap:10px;margin-top:22px;}

  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:20px;z-index:50;}
  .modal-box{max-width:460px;width:100%;max-height:82vh;overflow-y:auto;background:#1a3f31;border:1px solid var(--felt-line);border-radius:16px;padding:24px;}
  .modal-box h3{font-family:'Shippori Mincho',serif;color:var(--gold-soft);margin-top:0;}
  .modal-box h4{font-size:.85rem;color:var(--gold-soft);margin:16px 0 6px;}
  .modal-box ul{padding-left:1.1em;font-size:.82rem;line-height:1.65;color:var(--cream);margin:6px 0;}
  .modal-box .note{font-size:.74rem;color:var(--muted-dim);margin-top:14px;line-height:1.6;}
  .modal-close{margin-top:16px;width:100%;padding:11px 0;border:none;border-radius:9px;background:rgba(255,255,255,.1);
    color:var(--cream);font-weight:700;cursor:pointer;font-family:inherit;}
  .landing-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .landing-card{width:100%;max-width:460px;background:linear-gradient(180deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
    border:1px solid var(--felt-line);border-radius:18px;padding:32px 28px 28px;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
  .tab-row{display:flex;gap:8px;margin-bottom:18px;}
  .tab-btn{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--felt-line);background:rgba(255,255,255,.03);
    color:var(--cream);font-size:.92rem;cursor:pointer;font-weight:700;font-family:inherit;}
  .tab-btn.active{background:var(--gold);color:var(--felt-dark);border-color:var(--gold);}
  .field-input{width:100%;padding:11px 14px;border-radius:9px;border:1px solid var(--felt-line);background:rgba(0,0,0,.18);
    color:var(--cream);font-size:1rem;font-family:inherit;margin-bottom:12px;letter-spacing:.05em;}
  .lobby-list{display:flex;flex-direction:column;gap:8px;margin:16px 0;}
  .lobby-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.04);border:1px solid var(--felt-line);}
  .lobby-row .lname{flex:1;font-weight:700;font-size:.9rem;}
  .lobby-row .lhost{font-size:.68rem;color:var(--gold-soft);font-weight:700;}
  .room-code-box{text-align:center;margin:14px 0;padding:16px;border-radius:12px;background:rgba(0,0,0,.2);border:1px dashed var(--gold-soft);}
  .room-code-box .code{font-size:2rem;font-weight:900;letter-spacing:.15em;color:var(--gold-soft);font-family:'Shippori Mincho',serif;}
  .room-code-box .link{font-size:.72rem;color:var(--muted);word-break:break-all;margin-top:8px;}
  .copy-btn{margin-top:10px;padding:8px 16px;border-radius:8px;border:1px solid var(--gold-soft);background:none;color:var(--gold-soft);
    font-size:.78rem;cursor:pointer;font-family:inherit;}
  .error-msg{color:#e08a8a;font-size:.82rem;text-align:center;margin-top:10px;min-height:1.2em;}
  .waiting-msg{text-align:center;color:var(--muted);font-size:.85rem;margin-top:10px;}
  .conn-badge{font-size:.62rem;padding:2px 8px;border-radius:10px;}
  .conn-badge.online{background:rgba(80,180,120,.2);color:#8fd19e;}
  .conn-badge.offline{background:rgba(200,80,80,.2);color:#e08a8a;}
</style>
</head>
<body>
<div id="app"></div>
<script src="client.js"></script>
</body>
</html>
